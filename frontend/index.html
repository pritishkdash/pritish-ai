<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pritish AI</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
}

/* Main Card */
.container {
    width: 420px;
    height: 620px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.header {
    text-align: center;
    padding: 20px;
}

.header h1 {
    margin: 0;
    font-size: 22px;
}

.header p {
    margin: 5px 0 0;
    font-size: 13px;
    opacity: 0.7;
}

/* Messages */
.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* Empty state */
.empty {
    text-align: center;
    margin-top: 40%;
    opacity: 0.6;
    font-size: 14px;
}

/* Message bubble */
.message {
    padding: 12px 14px;
    margin: 8px 0;
    border-radius: 14px;
    max-width: 75%;
    font-size: 14px;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #4facfe;
    color: white;
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.12);
    color: white;
    align-self: flex-start;
}

/* Input */
.input-area {
    display: flex;
    padding: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    margin-left: 10px;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: #00c9a7;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #00a98d;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🤖 Pritish AI</h1>
        <p>Personal AI Assistant • Built with RAG</p>
    </div>

    <div class="messages" id="messages">
        <div class="empty" id="empty">
            Ask anything about Pritish 👇
        </div>
    </div>

    <div class="input-area">
        <input id="input" placeholder="Type your question..." />
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
const messagesDiv = document.getElementById("messages");
const emptyState = document.getElementById("empty");

function addMessage(text, sender) {
    if (emptyState) emptyState.style.display = "none";

    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;

    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const typing = document.createElement("div");
    typing.classList.add("message", "bot");
    typing.innerText = "Typing...";
    messagesDiv.appendChild(typing);

    try {
        const res = await fetch("https://pritish-ai.onrender.com", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({question: text})
        });

        const data = await res.json();
        typing.innerText = data.answer;

    } catch (err) {
        typing.innerText = "Error connecting to server.";
    }
}

/* Enter key support */
document.getElementById("input")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

/* Autofocus */
document.getElementById("input").focus();
</script>

</body>
</html>
