<script>
const messagesDiv = document.getElementById("messages");
const emptyState = document.getElementById("empty");

let isSending = false; // ✅ prevent duplicate calls

function addMessage(text, sender) {
    if (emptyState) emptyState.style.display = "none";

    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;

    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
    if (isSending) return; // 🚫 avoid multiple requests
    isSending = true;

    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) {
        isSending = false;
        return;
    }

    addMessage(text, "user");
    input.value = "";

    const typing = document.createElement("div");
    typing.classList.add("message", "bot");
    typing.innerText = "Typing...";
    messagesDiv.appendChild(typing);

    try {
        const res = await fetch("https://pritish-ai.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: text }),
            mode: "cors"
        });

        if (!res.ok) {
            typing.innerText = "Server error: " + res.status;
            isSending = false;
            return;
        }

        // 🔥 safer parsing
        const textResponse = await res.text();
        let data;

        try {
            data = JSON.parse(textResponse);
        } catch {
            typing.innerText = "Invalid server response";
            isSending = false;
            return;
        }

        console.log("API RESPONSE:", data);

        // ✅ safe rendering
        if (data.answer) {
            typing.innerText = data.answer;
        } else if (data.error) {
            typing.innerText = "Error: " + data.error;
        } else {
            typing.innerText = "No response from server";
        }

    } catch (err) {
        typing.innerText = "Error connecting to server.";
        console.error(err);
    }

    isSending = false;
}

// ✅ FIX: use keydown instead of keypress
document.getElementById("input")
.addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
});

// autofocus
document.getElementById("input").focus();
</script>
